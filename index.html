<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pika Verse | Spot Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --pika-yellow: #FFCB05; --electric-gold: #FFD700; }
        
        body { 
            background: #000; 
            color: black; 
            font-family: 'Outfit', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ড লাইটিং কারেন্ট ইফেক্ট */
        .lighting-bg {
            position: fixed; inset: 0; z-index: -1;
            background: #FFCB05; 
        }
        
        .electric-bolt {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.4), transparent 70%);
            filter: blur(60px);
            animation: lightning-strike 4s linear infinite;
        }

        @keyframes lightning-strike {
            0%, 10%, 20%, 50%, 100% { opacity: 0; transform: scale(1); }
            5%, 15%, 25% { opacity: 1; transform: scale(1.2); background: white; }
            55% { opacity: 0.5; background: var(--electric-gold); }
        }

        /* মেইন চেকার কার্ড */
        .checker-card {
            background: #000;
            color: white;
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            max-width: 550px; width: 95%; text-align: center;
            position: relative;
            border: 1px solid rgba(255, 203, 5, 0.3);
            z-index: 10;
            margin-top: 50px;
        }

        /* পিকাচু ইমেজ */
        .pika-img {
            width: 120px;
            position: absolute;
            top: -90px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 15px rgba(255, 203, 5, 0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        .header-text { font-family: 'Bangers', cursive; letter-spacing: 2px; color: var(--pika-yellow); }

        /* ইনপুট বক্সের কারেন্ট বর্ডার */
        .input-container {
            position: relative;
            margin: 25px 0;
            padding: 3px;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
        }

        .input-container::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, #FFCB05, transparent 30%);
            animation: rotate-electric 3s linear infinite;
        }

        @keyframes rotate-electric { 100% { transform: rotate(360deg); } }

        input {
            position: relative;
            background: #000;
            border: none;
            padding: 18px; 
            border-radius: 18px;
            color: white; width: 100%; outline: none; text-align: center;
            font-size: 16px; z-index: 2;
        }

        .check-btn {
            background: var(--pika-yellow); color: black; font-weight: 900;
            padding: 12px 30px; border-radius: 50px; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            font-size: 14px; display: inline-block;
        }
        .check-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--pika-yellow); }

        .result-box { margin-top: 25px; padding: 20px; border-radius: 20px; display: none; }
        .gtd { border: 2px solid #00E5FF; color: #00E5FF; background: rgba(0, 229, 255, 0.1); }
        .wl { border: 2px solid var(--pika-yellow); color: var(--pika-yellow); background: rgba(255, 203, 5, 0.1); }
        .none { border: 1px dashed #ff4d4d; color: #ff4d4d; background: rgba(255, 0, 0, 0.1); }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 18px; border-radius: 12px;
            font-size: 11px; font-weight: 900; transition: 0.2s;
        }
        .action-btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="lighting-bg">
        <div class="electric-bolt"></div>
    </div>

    <div class="checker-card">
        <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png" class="pika-img" alt="Pika">
        
        <h1 class="header-text text-5xl mb-2">CHECK YOUR SPOT</h1>
        <p class="text-[10px] text-gray-500 tracking-[0.4em] mb-4 uppercase italic">Official Pika Verse Portal</p>

        <div class="input-container">
            <input type="text" id="walletInput" placeholder="Enter Wallet Address (0x...)">
        </div>
        
        <button onclick="checkStatus()" id="mainBtn" class="check-btn">⚡ Verify Status</button>

        <div id="result" class="result-box">
            <h2 id="resTitle" class="font-black text-xl mb-1"></h2>
            <p id="resDesc" class="text-sm italic"></p>
        </div>

        <div class="grid grid-cols-3 gap-2 mt-8 py-4 border-y border-white/10 text-[10px] font-black text-yellow-500 uppercase">
            <div>Supply: 999</div>
            <div>Date: 18.03.2026</div>
            <div>Base Chain</div>
        </div>

        <div class="flex gap-3 mt-6 justify-center">
            <a href="https://opensea.io/collection/the-pika-vers/overview" target="_blank" class="action-btn">MINT PAGE</a>
            <a href="https://x.com/thepikachuverse" target="_blank" class="action-btn">FOLLOW X</a>
        </div>
    </div>

    <script>
        // আপনার Google Script URL এখানে বসাবেন
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8FQ5KUZuQdzp8euGZEupROGEzLDMFKE-foDTVMOPnQyMbHemTnWiH26L5FFiRbluR/exec';

        async function checkStatus() {
            const wallet = document.getElementById('walletInput').value.trim().toLowerCase();
            const res = document.getElementById('result');
            const btn = document.getElementById('mainBtn');

            if (wallet.length < 42) { alert("Invalid wallet address!"); return; }

            btn.innerText = "VERIFYING...";
            res.style.display = "none";

            try {
                const response = await fetch(`${SCRIPT_URL}?wallet=${wallet}`);
                const data = await response.json();
                res.style.display = "block";

                if (data.type === "GTD") {
                    res.className = "result-box gtd";
                    document.getElementById('resTitle').innerText = "GTD ACCESS CONFIRMED!";
                    document.getElementById('resDesc').innerText = "Congratulations! Your spot is guaranteed.";
                } else if (data.type === "WL") {
                    res.className = "result-box wl";
                    document.getElementById('resTitle').innerText = "WL FCFS ELIGIBLE!";
                    document.getElementById('resDesc').innerText = "You are on the FCFS list. Be fast!";
                } else {
                    res.className = "result-box none";
                    document.getElementById('resTitle').innerText = "NOT ELIGIBLE";
                    document.getElementById('resDesc').innerText = "Follow X for more opportunities!";
                }
            } catch (e) {
                alert("Error! Please check if your Google Script URL is correct.");
            }
            btn.innerText = "⚡ Verify Status";
        }
    </script>
</body>
</html>
